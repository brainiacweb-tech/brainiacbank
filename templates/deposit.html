{% extends "base.html" %}
{% block title %}Deposit — BrainiacBank{% endblock %}
{% block content %}
<div class="page-header">
    <h1>Deposit Funds</h1>
    <p>Add money to your account</p>
</div>

<div class="two-col">
    <div class="content-card">
        <div class="card-header"><h2>Make a Deposit</h2></div>
        <div class="card-body">
            <form method="POST" data-validate>
                <div class="form-group">
                    <label>Account</label>
                    <input type="text" class="form-control" value="{{ user.account_number }} — {{ user.full_name }}" disabled>
                </div>
                <div class="form-group">
                    <label>Amount (GH₵)</label>
                    <input type="number" name="amount" class="form-control" placeholder="0.00" step="0.01" min="0.01" max="1000000" required>
                </div>
                <button type="submit" class="btn btn-success btn-lg" style="width:100%;justify-content:center;">
                    <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><polyline points="19 12 12 19 5 12"/></svg>
                    Deposit Now
                </button>
            </form>
        </div>
    </div>

    <div class="content-card">
        <div class="card-header"><h2>Account Summary</h2></div>
        <div class="card-body">
            <div class="account-info-card">
                <div class="account-info-label">Current Balance</div>
                <div class="account-balance-large">GH₵ {{ "%.2f"|format(user.balance) }}</div>
                <div style="display:flex;gap:2rem;margin-top:1rem;">
                    <div>
                        <div class="account-info-label">Account Type</div>
                        <div class="account-info-value" style="text-transform:capitalize;">{{ user.account_type }}</div>
                    </div>
                    <div>
                        <div class="account-info-label">Status</div>
                        <div class="account-info-value" style="color:var(--success);">Active</div>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
