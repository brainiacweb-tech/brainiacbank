{% extends "base.html" %}
{% block title %}Register — BrainiacBank{% endblock %}
{% block content %}
<div class="auth-page">
    <div class="auth-container" style="max-width:500px;">
        <div style="text-align:center;margin-bottom:2rem;">
            <a href="/" class="navbar-brand" style="justify-content:center;font-size:1.5rem;">
                <img src="{{ url_for('static', filename='images/logo.png') }}" alt="BrainiacBank Logo" style="width:36px;height:36px;object-fit:contain;margin-right:8px;">
                <span>Brainiac<span style="color:var(--primary);">Bank</span></span>
            </a>
        </div>
        <div class="auth-card">
            <div class="auth-header">
                <h1>Create Account</h1>
                <p>Open your BrainiacBank account today</p>
            </div>
            <form method="POST" data-validate>
                <div class="form-group">
                    <label>Full Name</label>
                    <input type="text" name="full_name" class="form-control" placeholder="Kwame Asante" required>
                </div>
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
                </div>
                <div class="form-group">
                    <label>Phone Number</label>
                    <input type="tel" name="phone" class="form-control" placeholder="+233 XX XXX XXXX" required>
                </div>
                <div class="form-group">
                    <label>Account Type</label>
                    <select name="account_type" class="form-control" required>
                        <option value="savings">Savings Account</option>
                        <option value="current">Current Account</option>
                        <option value="checking">Checking Account</option>
                        <option value="business">Business Account</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <div class="password-wrapper">
                        <input type="password" name="password" class="form-control" placeholder="Min. 6 characters" required minlength="6">
                        <button type="button" class="password-toggle" aria-label="Toggle password">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                </div>
                <div class="form-group">
                    <label>Confirm Password</label>
                    <div class="password-wrapper">
                        <input type="password" name="confirm_password" class="form-control" placeholder="Repeat your password" required>
                        <button type="button" class="password-toggle" aria-label="Toggle password">
                            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
                        </button>
                    </div>
                </div>
                <button type="submit" class="btn btn-primary btn-lg" style="width:100%;justify-content:center;">Create Account</button>
            </form>
            <div class="auth-footer">
                Already have an account? <a href="{{ url_for('auth.login') }}">Sign in</a>
            </div>
        </div>
    </div>
</div>
{% endblock %}
